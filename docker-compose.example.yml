services:
  MCServer-panel:
    image: ghcr.io/doosys/mcserver-panel:${APP_DOCKER_TAG}
    container_name: MCServer-panel
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Mapping clair depuis le .env utilisateur vers les variables internes du panel.
      MC_RCON_HOST: "${SERVER}"
      MC_RCON_PORT: "${RCON_PORT}"
      MC_RCON_PASSWORD: "${RCON_PASSWORD}"
      MC_DATA_PATH: "/mc-data"
      POCKETBASE_DATA: "/app/pb_data"
      MC_CONTAINER_NAME: "${MC_CONTAINER_NAME}"
      PANEL_CONTAINER_NAME: "${PANEL_CONTAINER_NAME}"
      DOCKER_SOCKET_PATH: "${DOCKER_SOCKET_PATH}"
    volumes:
      # Dossier monde existant du serveur Minecraft, monte dans le panel uniquement.
      # Ce compose ne gere pas le conteneur Minecraft et ne le redemarre pas.
      - ${MC_WORLD_PATH}:/mc-data

      # Donnees persistantes propres au panel : PocketBase, comptes, roles, audit.
      - ${PANEL_DATA_PATH}:/app/pb_data

      # Lecture des logs Docker des conteneurs Minecraft et MCServer-panel.
      # Necessaire pour afficher docker logs depuis l interface.
      - ${DOCKER_SOCKET_PATH}:/var/run/docker.sock:ro
    ports:
      - "8088:8080"
    networks:
      - minecraft-access
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  minecraft-access:
    external: true
    name: ${MC_DOCKER_NETWORK}
