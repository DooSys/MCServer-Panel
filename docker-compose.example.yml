services:
  MCServer-panel:
    image: ghcr.io/doosys/mcserver-panel:${APP_DOCKER_TAG}
    container_name: MCServer-panel
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Dossier monde existant du serveur Minecraft, monte dans le panel uniquement.
      # Ce compose ne gere pas le conteneur Minecraft et ne le redemarre pas.
      - ${MC_WORLD_PATH}:/mc-data
      - ${PANEL_PB_DATA_PATH}:/app/pb_data
    ports:
      - "8088:8080"
    networks:
      - minecraft-access
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  minecraft-access:
    external: true
    name: ${MC_DOCKER_NETWORK}
